MM_TOOL_PATH: ./mindspeed_mm/tools/tools.json

### GPT args
gpt_args:
  ## parallel: （TP/PP/CP/)
  context_parallel_size: 1
  context_parallel_algo: ulysses_cp_algo
  tensor_model_parallel_size: 2
  sequence_parallel: true
  expert_model_parallel_size: 4
  pipeline_model_parallel_size: 1

  ## training:
  clip_grad: 1.0
  micro_batch_size: 1
  global_batch_size: 16  #默认16卡配置， global_batch_sizes=micro_batch_size*grad_acc_step*dp=micro_batch_size*grad_acc_step*(world_size/cp)
  optimizer_selection: "fused_torch_adamw"
  lr: 1.0e-5
  weight_decay: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.999
  lr_decay_style: cosine
  lr_warmup_fraction: 0.1
  train_iters: 2000
  ckpt_format: torch
  no_load_optim: true  # 不加载优化器状态，若需加载请移除
  no_load_rng: true  # 不加载随机数状态，若需加载请移除
  no_save_optim: true  # 不保存优化器状态，若需保存请移除
  no_save_rng: true  # 不保存随机数状态，若需保存请移除
  seed: 42
  bf16: true

  use_distributed_optimizer: true
  overlap_grad_reduce: true

  ## save_and_logging:
  log_interval: 1
  save_interval: 10000
  eval_interval: 10000
  eval_iters: 5000
  save: save_dir
  log_tps: true

  ## model:
  load: ckpt/Qwen3.5-35B-A3B
  normalization: RMSNorm
  use_fused_rmsnorm: true
  swiglu: true
  use_fused_swiglu: true
  use_flash_attn: true
  moe_grouped_gemm: true
  moe_permute_fusion: true
  moe_token_dispatcher_type: alltoall
  vocab_size: 152064
  seq_length: 1024
  make_vocab_size_divisible_by: 1
  tokenizer_type: NullTokenizer
  no_gradient_accumulation_fusion: true
  untie_embeddings_and_output_weights: true
  no_masked_softmax_fusion: true

  ## data:
  num_workers: 8


### 模型相关配置
model:
  freeze_vision_model: true
  freeze_vision_projection: true
  freeze_language_model: false

  image_encoder:
    vision_encoder:
      num_layers: 27
      hidden_size: 1152
      in_channels: 3
      ffn_hidden_size: 4304
      num_attention_heads: 16
      num_position_embeddings: 2304
      out_hidden_size: 2048
      patch_size: 16
      spatial_merge_size: 2
      temporal_patch_size: 2
      add_bias_linear: true
      add_qkv_bias: true
      add_bias_conv: true
      hidden_dropout: 0.0
      attention_dropout: 0.0
      gated_linear_unit: false
      bias_dropout_fusion: true
  text_decoder:
    model_id: qwen3_5_moe
    # parallel
    expert_model_parallel_size: 4
    tensor_model_parallel_size: 2
    pipeline_model_parallel_size: 1
    sequence_parallel: true

    causal_conv1d_implementation: triton
    gdn_implementation: AscendC

    image_token_id: 248056
    video_token_id: 248057
    vision_start_token_id: 248053
    vision_end_token_id: 248054
    eos_token_id: 248044
    bos_token_id: 248045

    num_layers: 40
    linear_attention_freq: 4
    num_attention_heads: 16
    hidden_size: 2048
    # Gated DeltaNet (GDN) config
    linear_conv_kernel_dim: 4
    linear_key_head_dim: 128
    linear_num_key_heads: 16
    linear_num_value_heads: 32
    linear_value_head_dim: 128
    # MoE config
    num_moe_experts: 256
    moe_router_topk: 8
    moe_ffn_hidden_size: 512
    moe_shared_expert_intermediate_size: 512
    moe_shared_expert_gate: true
    moe_router_load_balancing_type: none
    moe_aux_loss_coeff: 1e-3
    moe_grouped_gemm: true
    moe_router_pre_softmax: true
    moe_token_dispatcher_type: alltoall
    moe_permute_fusion: true
    # Common LLM config
    share_embeddings_and_output_weights: false
    normalization: RMSNorm
    gated_linear_unit: true
    add_bias_linear: false
    add_qkv_bias: false
    qk_layernorm: true
    kv_channels: 256
    num_query_groups: 2
    hidden_dropout: 0.0
    attention_dropout: 0.0
    attention_softmax_in_fp32: true
    rotary_base: 10000000.0
    rotary_percent: 0.25
    seq_length: 1024
    bf16: true

    # VL-specidic config
    position_embedding_type: mrope
    mrope_section: [11, 11, 10]
    apply_rotary_pos_emb_in_fp32: false
    max_position_embeddings: 8192
    vocab_size: 248320
    recompute_num_layers: 0
    recompute_granularity: full
    recompute_method: block
  patch:
      clip_grad_async: true
      bridge_patch: true


### 数据相关配置
data:
  dataset_param:
    dataset_type: huggingface
    #数据集属性
    attr:
      system: null
      images: images
      videos: null
      messages: messages
      role_tag: role
      content_tag: content
      user_tag: user
      assistant_tag: assistant
      observation_tag: null
      function_tag: null
      system_tag: null

    # 数据预处理
    preprocess_parameters:
      model_name_or_path: ckpt/Qwen3.5-35B-A3B
      use_fast_tokenizer: true
      split_special_tokens: false
      image_max_pixels: 262144
      image_min_pixels: 1024
      video_max_pixels: 16384
      video_min_pixels: 0
      video_fps: 2.0
      video_maxlen: 64

    basic_parameters:
      template: qwen3_vl_nothink
      enable_thinking: false
      train_on_prompt: false
      mask_history: false
      tool_format: null
      dataset_dir: datasets/qwen35_datasets/
      dataset: datasets/qwen35_datasets.json
      cache_dir: ./data/cache_dir
      overwrite_cache: false
      preprocessing_batch_size: 1000
      preprocessing_num_workers: 16
      max_samples: null

  # 数据加载
  dataloader_param:
    pin_memory: true
    shuffle: false
    dataloader_mode: sampler
    drop_last: true
    sampler_type: BaseRandomBatchSampler
    num_workers: 0
    collate_param:
      model_name: qwen3vl
      ignore_pad_token_for_loss: true


# 工具配置
tools:
  profile:
    enable: false
    profile_type: static
    ranks: [0]
    static_param:
      level: level1
      with_stack: false
      with_memory: false
      record_shapes: false
      with_cpu: true
      save_path: ./profiling
      start_step: 10
      end_step: 11
      data_simplification: false
      aic_metrics_type: PipeUtilization
  memory_profile:
      enable: false
      start_step: 1
      end_step: 2
      save_path: ./memory_snapshot
      dump_ranks: [0]
      stacks: all
      max_entries: null
      mem_info: false
